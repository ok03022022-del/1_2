<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Тренажер: Повторная идентификация ОПО</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Montserrat:wght@400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: white;
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        .trainer-master {
            width: 100%;
            max-width: 1000px;
            aspect-ratio: 1 / 1;
            background: #ffffff;
            border-radius: 28px;
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .blue-header {
            background: linear-gradient(112deg, #e6f3ff 0%, #d4eaff 100%);
            padding: 12px 20px;
            border-bottom: 1px solid #c5e0f5;
            text-align: center;
            flex-shrink: 0;
        }
        .blue-header h1 {
            font-family: 'Playfair Display', serif;
            font-weight: 800;
            font-size: 1.2rem;
            background: linear-gradient(135deg, #1976d2, #0b5e9e);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 4px;
        }
        .blue-header p {
            color: #1565c0;
            font-weight: 500;
            font-size: 0.7rem;
        }

        .workspace {
            display: flex;
            flex-direction: row;
            gap: 20px;
            padding: 20px;
            background: #fefefe;
            flex: 1;
            min-height: 0;
            position: relative;
        }

        .bucket {
            flex: 1;
            min-width: 0;
            background: #f8fcff;
            border-radius: 20px;
            border: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .bucket-header {
            padding: 10px 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid #e2e8f0;
            background: white;
            flex-shrink: 0;
        }
        .bucket-header svg {
            width: 24px;
            height: 24px;
            flex-shrink: 0;
        }
        .bucket-header span {
            font-weight: 700;
            font-size: 0.8rem;
            letter-spacing: 0.3px;
            line-height: 1.2;
        }
        .bucket-items {
            flex: 1;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            overflow-y: auto;
            min-height: 0;
        }

        .bucket.drag-over .bucket-items {
            background: #eef2ff;
            border-radius: 12px;
        }
        #bucket-yes.drag-over .bucket-items { background: #e8f5e9; }
        #bucket-no.drag-over .bucket-items { background: #ffebee; }

        .card-container {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1000;
            pointer-events: none;
        }

        .floating-card {
            width: 380px;
            max-width: 80vw;
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 35px -8px rgba(0,0,0,0.2), 0 0 0 6px rgba(25,118,210,0.1);
            padding: 16px 20px;
            text-align: center;
            font-weight: 600;
            font-size: 0.85rem;
            line-height: 1.4;
            color: #2c3e50;
            cursor: grab;
            border-left: 4px solid #1976d2;
            font-family: 'Montserrat', sans-serif;
            word-break: break-word;
            pointer-events: auto;
            animation: cardFloatIn 0.35s ease;
        }
        .floating-card:active {
            cursor: grabbing;
        }
        @keyframes cardFloatIn {
            from { opacity: 0; transform: scale(0.92); }
            to { opacity: 1; transform: scale(1); }
        }

        .decision-item {
            background: white;
            border-radius: 40px;
            padding: 8px 12px;
            font-size: 0.7rem;
            font-weight: 500;
            color: #2c3e50;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            border-left: 3px solid #1976d2;
            transition: all 0.2s;
            animation: slideItem 0.25s ease-out;
            word-break: break-word;
            line-height: 1.3;
        }
        @keyframes slideItem {
            from { opacity: 0; transform: translateX(8px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .decision-item.correct-mark {
            border-left-color: #2e7d32;
            background: #e8f5e9;
            color: #1b5e20;
        }

        .action-panel {
            padding: 10px 20px 16px;
            background: white;
            border-top: 1px solid #e2e8f0;
            text-align: center;
            flex-shrink: 0;
        }
        .button-group {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 8px;
            flex-wrap: wrap;
        }
        .blue-button {
            background: linear-gradient(105deg, #1976d2, #0d47a1);
            border: none;
            padding: 8px 24px;
            font-size: 0.75rem;
            font-weight: 700;
            font-family: 'Montserrat', sans-serif;
            color: white;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
        }
        .blue-button:hover {
            transform: scale(1.01);
            background: linear-gradient(105deg, #2196f3, #1565c0);
        }
        .final-message {
            margin-top: 8px;
            font-size: 0.75rem;
            font-weight: 600;
            padding: 8px 12px;
            border-radius: 40px;
            transition: all 0.2s;
            background: #f8fcff;
            color: #2c3e50;
        }
        .final-message.success {
            background: #e8f5e9;
            color: #2e7d32;
        }
        .final-message.warning {
            background: #fff3e0;
            color: #e65100;
        }
        .final-message.error {
            background: #ffebee;
            color: #c62828;
        }

        /* Модальное окно для пояснений */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        .modal-window {
            background: white;
            border-radius: 28px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            animation: modalFadeIn 0.3s ease;
        }
        @keyframes modalFadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .modal-header {
            background: linear-gradient(112deg, #e6f3ff 0%, #d4eaff 100%);
            padding: 14px 18px;
            border-bottom: 1px solid #c5e0f5;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-header h3 {
            color: #1976d2;
            font-size: 1rem;
            font-weight: 700;
        }
        .modal-close {
            background: none;
            border: none;
            font-size: 1.4rem;
            cursor: pointer;
            color: #999;
            transition: 0.2s;
        }
        .modal-close:hover {
            color: #c62828;
        }
        .modal-body {
            padding: 16px;
            font-size: 0.8rem;
            line-height: 1.5;
            color: #2c3e50;
        }
        .explanation-item {
            background: #f8fcff;
            padding: 10px;
            border-radius: 14px;
            margin-bottom: 10px;
            border-left: 3px solid #2e7d32;
        }
        .explanation-item .question-text {
            font-weight: 700;
            color: #2e7d32;
            margin-bottom: 4px;
            font-size: 0.75rem;
        }
        .explanation-item .answer-text {
            font-size: 0.7rem;
            color: #2c3e50;
            margin-bottom: 6px;
        }
        .explanation-item .explanation-text {
            font-size: 0.7rem;
            color: #5a6e85;
        }

        /* Стили для скролла */
        .bucket-items::-webkit-scrollbar {
            width: 4px;
        }
        .bucket-items::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 4px;
        }
        .bucket-items::-webkit-scrollbar-thumb {
            background: #1976d2;
            border-radius: 4px;
        }

        @media (max-width: 700px) {
            .trainer-master {
                aspect-ratio: auto;
                height: auto;
                max-height: 90vh;
            }
            .workspace {
                gap: 12px;
                padding: 12px;
            }
            .bucket-header {
                padding: 8px 10px;
            }
            .bucket-header span {
                font-size: 0.7rem;
            }
            .bucket-header svg {
                width: 20px;
                height: 20px;
            }
            .floating-card {
                width: 85vw;
                padding: 14px 16px;
                font-size: 0.8rem;
            }
            .blue-header h1 {
                font-size: 1rem;
            }
            .blue-header p {
                font-size: 0.65rem;
            }
        }
    </style>
</head>
<body>

<div class="trainer-master">
    <div class="blue-header">
        <h1>ПОВТОРНАЯ ИДЕНТИФИКАЦИЯ ОПО</h1>
        <p>Перетащите карточку в нужную колонку: <span style="color:#1976d2;">✔ Требуется</span> или <span style="color:#c62828;">✘ Не требуется</span></p>
    </div>

    <div class="workspace">
        <div class="bucket" id="bucket-yes" data-side="yes">
            <div class="bucket-header" style="color: #1565c0;">
                <svg viewBox="0 0 24 24" fill="currentColor" width="24" height="24">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                </svg>
                <span>ТРЕБУЕТСЯ</span>
            </div>
            <div class="bucket-items" id="list-yes"></div>
        </div>

        <div class="bucket" id="bucket-no" data-side="no">
            <div class="bucket-header" style="color: #c62828;">
                <svg viewBox="0 0 24 24" fill="currentColor" width="24" height="24">
                    <path d="M12 2C6.47 2 2 6.47 2 12s4.47 10 10 10 10-4.47 10-10S17.53 2 12 2zm5 13.59L15.59 17 12 13.41 8.41 17 7 15.59 10.59 12 7 8.41 8.41 7 12 10.59 15.59 7 17 8.41 13.41 12 17 15.59z"/>
                </svg>
                <span>НЕ ТРЕБУЕТСЯ</span>
            </div>
            <div class="bucket-items" id="list-no"></div>
        </div>
    </div>

    <div class="action-panel">
        <button id="check-btn" class="blue-button" style="display: none;">ПРОВЕРИТЬ РЕЗУЛЬТАТ</button>
        <div id="button-group" class="button-group" style="display: none;"></div>
        <div id="final-msg" class="final-message"></div>
    </div>
</div>

<!-- Модальное окно для пояснений -->
<div id="explanationModal" class="modal-overlay">
    <div class="modal-window">
        <div class="modal-header">
            <h3>📖 Пояснение к правильным ответам</h3>
            <button class="modal-close" id="closeModalBtn">&times;</button>
        </div>
        <div class="modal-body" id="modalBody"></div>
    </div>
</div>

<script>
    const rawSituations = [
        { text: "Провели модернизацию ОПО, в результате которой за счет повышения давления в сосуде увеличилась производительность", needReid: true, explanation: "Изменение рабочего давления — это изменение характеристик технического устройства, что требует повторной идентификации." },
        { text: "Расширили вместимость склада хранения химреагентов: смонтировали дополнительный резервуар для хранения нового реагента", needReid: true, explanation: "Увеличение количества опасных веществ и появление нового реагента — основания для повторной идентификации." },
        { text: "На стройплощадку приобрели новый башенный кран", needReid: true, explanation: "Появление нового технического устройства (подъемного сооружения) требует внесения в реестр и повторной идентификации." },
        { text: "Провели модернизацию, в результате которой мостовые краны с кабинами перевели на дистанционное управление", needReid: true, explanation: "Изменение типа управления кранами — это изменение технических характеристик оборудования." },
        { text: "Назначен новый технолог производства", needReid: false, explanation: "Кадровые изменения (смена технолога) не влияют на признаки опасности ОПО и не требуют повторной идентификации." },
        { text: "Внесли изменения в порядок и периодичность обходов объекта персоналом", needReid: false, explanation: "Изменение внутренних регламентов обходов не относится к критериям повторной идентификации." },
        { text: "Изменили место расположения шкафчика аварийных СИЗ и инструментов", needReid: false, explanation: "Перемещение вспомогательного инвентаря не влияет на опасность объекта." },
        { text: "Провели экспертизу ПБ и продлили срок службы двум техническим устройствам на 4 года", needReid: false, explanation: "Продление срока службы без изменения характеристик оборудования не требует повторной идентификации." },
        { text: "Изменился кадастровый номер и адрес земельного участка, на котором расположен ОПО", needReid: false, explanation: "Изменение адреса и кадастрового номера (без изменения самого объекта) не влияет на признаки опасности." }
    ];

    let currentTasks = [];
    let currentIdx = 0;
    let isGameActive = false;
    let currentCard = null;
    let isProcessing = false;

    const bucketYes = document.getElementById('bucket-yes');
    const bucketNo = document.getElementById('bucket-no');
    const listYes = document.getElementById('list-yes');
    const listNo = document.getElementById('list-no');
    const checkBtn = document.getElementById('check-btn');
    const buttonGroup = document.getElementById('button-group');
    const finalMsgDiv = document.getElementById('final-msg');
    const modalOverlay = document.getElementById('explanationModal');
    const modalBody = document.getElementById('modalBody');
    const closeModalBtn = document.getElementById('closeModalBtn');

    function showExplanationModal(correctCards) {
        let explanationsHtml = '';
        correctCards.forEach((card, idx) => {
            const text = card.innerText;
            const situation = rawSituations.find(s => s.text === text);
            if (situation && situation.explanation) {
                explanationsHtml += `
                    <div class="explanation-item">
                        <div class="question-text">${idx + 1}. ${text}</div>
                        <div class="answer-text">✅ <strong>Верно</strong></div>
                        <div class="explanation-text">📖 ${situation.explanation}</div>
                    </div>
                `;
            }
        });
        
        if (explanationsHtml) {
            modalBody.innerHTML = explanationsHtml;
            modalOverlay.style.display = 'flex';
        }
    }

    function closeModal() {
        modalOverlay.style.display = 'none';
    }

    function createCardContainer() {
        let container = document.querySelector('.card-container');
        if (!container) {
            container = document.createElement('div');
            container.className = 'card-container';
            document.body.appendChild(container);
        }
        return container;
    }

    function removeCurrentCard() {
        if (currentCard && currentCard.remove) {
            currentCard.remove();
            currentCard = null;
        }
    }

    async function showNextCard() {
        if (isProcessing) return;
        isProcessing = true;
        
        removeCurrentCard();
        
        if (currentIdx >= currentTasks.length) {
            finishGame();
            isProcessing = false;
            return;
        }

        const task = currentTasks[currentIdx];
        const card = document.createElement('div');
        card.className = 'floating-card';
        card.innerText = task.text;
        card.setAttribute('draggable', 'true');
        
        card.addEventListener('dragstart', (e) => {
            if (!isGameActive) {
                e.preventDefault();
                return false;
            }
            e.dataTransfer.setData('text/plain', task.text);
            e.dataTransfer.effectAllowed = 'move';
            card.style.opacity = '0.6';
            e.stopPropagation();
        });
        
        card.addEventListener('dragend', (e) => {
            card.style.opacity = '1';
            e.stopPropagation();
        });
        
        const container = createCardContainer();
        container.appendChild(card);
        currentCard = card;
        
        await new Promise(resolve => setTimeout(resolve, 100));
        isProcessing = false;
    }

    function handleDrop(e, targetIsYes) {
        e.preventDefault();
        e.stopPropagation();
        
        const bucketDiv = e.currentTarget.closest('.bucket');
        if (bucketDiv) bucketDiv.classList.remove('drag-over');
        
        if (!isGameActive) return;
        if (currentIdx >= currentTasks.length) return;
        if (!currentCard) return;

        const currentTask = currentTasks[currentIdx];
        
        const listContainer = targetIsYes ? listYes : listNo;
        const itemDiv = document.createElement('div');
        itemDiv.className = 'decision-item';
        itemDiv.innerText = currentTask.text;
        itemDiv.dataset.correct = currentTask.needReid;
        itemDiv.dataset.chosen = targetIsYes;
        itemDiv.dataset.originalText = currentTask.text;
        itemDiv.dataset.explanation = currentTask.explanation || '';
        
        listContainer.appendChild(itemDiv);
        
        removeCurrentCard();
        currentIdx++;
        
        if (currentIdx < currentTasks.length) {
            setTimeout(() => showNextCard(), 150);
        } else {
            finishGame();
        }
    }

    function setupDropZones() {
        const yesZone = bucketYes.querySelector('.bucket-items');
        const noZone = bucketNo.querySelector('.bucket-items');
        
        function attachEvents(zoneElement, isYes) {
            zoneElement.addEventListener('dragover', (e) => {
                e.preventDefault();
                e.stopPropagation();
                const parentBucket = zoneElement.closest('.bucket');
                if(parentBucket && isGameActive) parentBucket.classList.add('drag-over');
            });
            
            zoneElement.addEventListener('dragleave', (e) => {
                e.preventDefault();
                e.stopPropagation();
                const parentBucket = zoneElement.closest('.bucket');
                if(parentBucket) parentBucket.classList.remove('drag-over');
            });
            
            zoneElement.addEventListener('drop', (e) => {
                e.preventDefault();
                e.stopPropagation();
                const parentBucket = zoneElement.closest('.bucket');
                if(parentBucket) parentBucket.classList.remove('drag-over');
                if (!isGameActive) return;
                if (currentIdx >= currentTasks.length) return;
                if (!currentCard) return;
                handleDrop(e, isYes);
            });
        }
        
        attachEvents(yesZone, true);
        attachEvents(noZone, false);
        
        [bucketYes, bucketNo].forEach(bucket => {
            bucket.addEventListener('dragover', (e) => {
                e.preventDefault();
                e.stopPropagation();
                if(isGameActive) bucket.classList.add('drag-over');
            });
            
            bucket.addEventListener('dragleave', (e) => {
                e.preventDefault();
                e.stopPropagation();
                bucket.classList.remove('drag-over');
            });
            
            bucket.addEventListener('drop', (e) => {
                e.preventDefault();
                e.stopPropagation();
                bucket.classList.remove('drag-over');
                if (isGameActive && currentIdx < currentTasks.length && currentCard) {
                    const isYes = bucket.id === 'bucket-yes';
                    handleDrop(e, isYes);
                }
            });
        });
    }

    function finishGame() {
        isGameActive = false;
        removeCurrentCard();
        checkBtn.style.display = 'inline-block';
    }

    function checkAndShowResults() {
        const yesItems = document.querySelectorAll('#list-yes .decision-item');
        const noItems = document.querySelectorAll('#list-no .decision-item');
        const allItems = [...yesItems, ...noItems];
        
        const correctCards = [];
        const wrongCards = [];
        
        allItems.forEach(item => {
            const correctVal = item.dataset.correct === 'true';
            const chosenVal = item.dataset.chosen === 'true';
            const isCorrect = (correctVal === chosenVal);
            
            if (isCorrect) {
                item.classList.add('correct-mark');
                correctCards.push(item);
            } else {
                wrongCards.push(item);
            }
        });
        
        if (wrongCards.length === 0) {
            finalMsgDiv.innerHTML = '🎉 Блестяще! Вы хорошо понимаете, после каких изменений надо пересмотреть сведения об ОПО.';
            finalMsgDiv.className = 'final-message success';
            checkBtn.style.display = 'none';
            buttonGroup.style.display = 'none';
            isGameActive = false;
            
            setTimeout(() => {
                showExplanationModal(correctCards);
            }, 200);
        } else {
            finalMsgDiv.innerHTML = `⚠️ НАЙДЕНО ОШИБОК: ${wrongCards.length} из ${allItems.length}. Выберите действие:`;
            finalMsgDiv.className = 'final-message warning';
            
            checkBtn.style.display = 'none';
            buttonGroup.style.display = 'flex';
            
            buttonGroup.innerHTML = `
                <button id="restart-all-btn" class="blue-button">🔄 НАЧАТЬ ЗАНОВО</button>
                <button id="fix-errors-btn" class="blue-button">✏️ ИСПРАВИТЬ ОШИБКИ</button>
            `;
            
            document.getElementById('restart-all-btn').onclick = () => restartAll();
            document.getElementById('fix-errors-btn').onclick = () => fixErrors(wrongCards);
        }
    }
    
    function restartAll() {
        listYes.innerHTML = '';
        listNo.innerHTML = '';
        
        currentTasks = rawSituations.map(s => ({ text: s.text, needReid: s.needReid, explanation: s.explanation }));
        shuffleArray(currentTasks);
        
        currentIdx = 0;
        isGameActive = true;
        checkBtn.style.display = 'none';
        buttonGroup.style.display = 'none';
        finalMsgDiv.innerHTML = '';
        finalMsgDiv.className = 'final-message';
        
        removeCurrentCard();
        showNextCard();
    }
    
    function fixErrors(wrongCardsArray) {
        wrongCardsArray.forEach(card => card.remove());
        
        const wrongTexts = wrongCardsArray.map(card => card.dataset.originalText || card.innerText);
        
        currentTasks = rawSituations
            .filter(s => wrongTexts.includes(s.text))
            .map(s => ({ text: s.text, needReid: s.needReid, explanation: s.explanation }));
        shuffleArray(currentTasks);
        
        currentIdx = 0;
        isGameActive = true;
        checkBtn.style.display = 'none';
        buttonGroup.style.display = 'none';
        finalMsgDiv.innerHTML = '';
        finalMsgDiv.className = 'final-message';
        
        removeCurrentCard();
        showNextCard();
    }
    
    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }
    
    function startNewGame() {
        currentTasks = rawSituations.map(s => ({ text: s.text, needReid: s.needReid, explanation: s.explanation }));
        shuffleArray(currentTasks);
        
        currentIdx = 0;
        isGameActive = true;
        
        listYes.innerHTML = '';
        listNo.innerHTML = '';
        finalMsgDiv.innerHTML = '';
        finalMsgDiv.className = 'final-message';
        checkBtn.style.display = 'none';
        buttonGroup.style.display = 'none';
        checkBtn.onclick = checkAndShowResults;
        
        removeCurrentCard();
        showNextCard();
    }
    
    function init() {
        setupDropZones();
        startNewGame();
    }
    
    init();
    
    closeModalBtn.onclick = closeModal;
    modalOverlay.onclick = (e) => {
        if (e.target === modalOverlay) closeModal();
    };
    
    window.addEventListener('dragstart', (e) => {
        if (!e.target.classList || !e.target.classList.contains('floating-card')) {
            e.preventDefault();
            return false;
        }
    });
</script>
</body>
</html>
